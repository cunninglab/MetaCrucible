name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same ref to save CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Public-fork safe: no repository secrets, no provider API keys, no live
# LLM SDK commands. CI runs the recorded-replay subset only (issue #45,
# ADR 0021, ADR 0028, ADR 0036).
jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install Mise
        uses: jdx/mise-action@v4
        with:
          version: "2026.6.14"

      - name: Provision Python and project venv via Mise
        run: mise install

      - name: Editable install of MetaCrucible and dev dependencies
        run: mise run install

      - name: Run the test suite (mise run test)
        run: mise run test

      # Recorded-replay CI harness (issue #45): exercises review,
      # bootstrap, optimize, and synthesize against replay fixtures
      # rather than live provider calls. The `test-replay` task runs
      # tests/test_replay_harness.py, tests/test_replay_cli.py,
      # tests/test_ci_workflow.py, and tests/test_mise_toolchain.py.
      - name: Run the recorded-replay pytest subset
        run: |
          # Replay coverage: review, bootstrap, optimize, synthesize
          mise run test-replay
