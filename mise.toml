# MetaCrucible toolchain (Issue #1).
#
# `mise.toml` is the single source of truth for project tool versions and
# task definitions. `mise install` provisions the listed tools and
# project virtualenv; `mise run <task>` executes a task. No competing
# environment manager (pyenv, poetry, pipenv, conda, asdf, ...) is to be
# added at the repo root without a rationale documented in this file.
[tools]
python = "3.14"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.install]
description = "Install MetaCrucible (editable) and dev dependencies into the project virtualenv"
run = "uv pip install -e \".[dev]\""

[tasks.test]
description = "Run the test suite (excludes opt-in local_real tests)"
depends = ["install"]
run = "pytest -m 'not local_real'"
[tasks.test-replay]
description = "Run the recorded-replay pytest subset (issue #45 CI harness)"
run = "pytest tests/test_replay_harness.py tests/test_replay_cli.py tests/test_ci_workflow.py tests/test_mise_toolchain.py"

[tasks.test-local-real]
description = "Run opt-in local-real smoke tests (issue #46); requires METACRUCIBLE_RUN_LOCAL_REAL=1 and a real runtime binary"
run = "pytest -m local_real"

[tasks.build]
description = "Build wheel and sdist into dist/ (PyPI release artifact; see issue #48)"
run = "uv build --wheel --sdist"

[tasks.release-gate]
description = "Validate pyproject.toml [project].version is a real release (not a placeholder) and CHANGELOG.md has a matching `## [<version>]` section; with --check-tag also requires the `v<version>` git tag (PyPI release gate; see issue #48)"
run = "python scripts/release_gate.py"